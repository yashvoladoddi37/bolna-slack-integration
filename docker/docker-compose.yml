version: '3.8'

services:
  bolna-slack-integration:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: bolna-slack-integration
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - ../.env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - bolna-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  bolna-network:
    driver: bridge

