services:
  - type: web
    name: bolna-slack-integration
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOLNA_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: BOLNA_API_BASE_URL
        value: https://api.bolna.ai
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
